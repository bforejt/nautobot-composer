---
# Nautobot 3.0 — Docker Compose
# Docs: https://docs.nautobot.com/projects/core/en/stable/user-guide/administration/guides/docker/

x-nautobot-build: &nautobot-build
  build:
    context: .
    dockerfile: Dockerfile

x-nautobot-env: &nautobot-env
  env_file:
    - .env

x-nautobot-depends: &nautobot-depends
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

x-nautobot-volumes: &nautobot-volumes
  volumes:
    - nautobot_media:/opt/nautobot/media
    - nautobot_git:/opt/nautobot/git
    # Bind-mount ./jobs into the container's JOBS_ROOT so custom Jobs can
    # be added to the project and version-controlled alongside the rest
    # of the deployment.  See ./jobs/README.md for details.
    - ./jobs:/opt/nautobot/jobs
    # Bind-mount the config for live editing without rebuilds:
    # - ./nautobot_config.py:/opt/nautobot/nautobot_config.py:ro

services:
  # --------------------------------------------------------------------------
  # Nautobot — Web Application Server (uWSGI)
  # --------------------------------------------------------------------------
  nautobot:
    <<: [*nautobot-build, *nautobot-env, *nautobot-depends, *nautobot-volumes]
    container_name: nautobot
    ports:
      - "80:8080"
      - "443:8443"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 30s
      timeout: 10s
      retries: 10
      # First start runs migrations for all installed Apps, which can take
      # a long time depending on the number of Apps and host performance.
      # start_period tells Docker not to count failures until this window
      # passes; it has no effect on normally fast restarts.
      start_period: 900s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Celery Worker — Background Task Execution
  # --------------------------------------------------------------------------
  celery_worker:
    <<: [*nautobot-build, *nautobot-env, *nautobot-depends, *nautobot-volumes]
    container_name: nautobot-celery-worker
    command: nautobot-server celery worker --loglevel INFO --events
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nautobot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "nautobot-server celery inspect ping --destination celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Celery Beat — Scheduled Task Orchestration
  # --------------------------------------------------------------------------
  celery_beat:
    <<: [*nautobot-build, *nautobot-env, *nautobot-depends, *nautobot-volumes]
    container_name: nautobot-celery-beat
    command: nautobot-server celery beat --loglevel INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nautobot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # PostgreSQL 16 — Primary Database
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: nautobot-db
    env_file:
      - .env
    volumes:
      - nautobot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Redis 7 — Cache, Broker, and Lock Backend
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nautobot-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - nautobot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # GitLab CE — Git Repository Server (opt-in)
  # --------------------------------------------------------------------------
  # Start with:  docker compose --profile gitlab up
  # First boot takes several minutes while GitLab runs internal configuration.
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: nautobot-gitlab
    profiles:
      - gitlab
    ports:
      - "8080:80"
      - "8443:443"
      - "2222:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8080'
        # Keep nginx listening on port 80 inside the container; Docker
        # maps host 8080 → container 80.  Without this, GitLab parses
        # the port from external_url and tries to bind nginx to 8080
        # internally, conflicting with Puma.
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        # Reduce resource usage for lab/small deployments.
        prometheus_monitoring['enable'] = false
        alertmanager['enable'] = false
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 900s
    restart: unless-stopped

volumes:
  nautobot_postgres_data:
    external: true
  nautobot_redis_data:
    external: true
  nautobot_media:
    external: true
  nautobot_git:
    external: true
  # nautobot_jobs: replaced by a bind mount to ./jobs (see x-nautobot-volumes)
  gitlab_config:
    external: true
  gitlab_logs:
    external: true
  gitlab_data:
    external: true
